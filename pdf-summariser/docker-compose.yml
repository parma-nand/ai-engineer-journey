version: "3.9"

services:

  resume-api:
    build: ./backend
    container_name: resume-upload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app   # 🔥 live sync
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload  # 🔥 IMPORTANT

  frontend:
    build: ./frontend
    container_name: resume_UI
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app   # 🔥 ADD THIS
    depends_on:
      - resume-api
    environment:
      - API_URL=http://resume-api:8000/parse
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.runOnSave true --server.fileWatcherType=poll